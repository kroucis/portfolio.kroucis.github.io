<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    :root {
      --bg:      #111;
      --fg:      #ddd;
      --muted:   #777;
      --accent:  #e8a045;
      --border:  #2a2a2a;
      --max-w:   720px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font: 300 1rem/1.7 Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* layout */
    nav, main, footer {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    nav a { color: var(--fg); font-size: 0.9rem; }
    nav a.active { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; }

    main { padding-top: 3rem; padding-bottom: 4rem; }
    footer { padding-top: 2rem; padding-bottom: 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }

    /* hero */
    .hero-name { font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; margin-bottom: 1rem; }
    .hero-bio   { color: var(--muted); max-width: 500px; margin-bottom: 1.5rem; }
    .hero-links { display: flex; gap: 1.5rem; font-size: 0.85rem; }

    /* section */
    h2 { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 3rem 0 1.25rem; }

    /* project card */
    .project-card         { display: block; padding: 1.25rem 0; border-top: 1px solid var(--border); color: var(--fg); }
    .project-card:last-child { border-bottom: 1px solid var(--border); }
    .project-card-title   { font-size: 1.1rem; margin-bottom: 0.35rem; }
    .project-card-meta    { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    .project-card-summary { font-size: 0.9rem; color: var(--muted); }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
    .tag  { font-size: 0.7rem; color: var(--muted); border: 1px solid var(--border); padding: 0.1rem 0.45rem; }

    /* blog list */
    .post-row             { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; padding: 1rem 0; border-top: 1px solid var(--border); color: var(--fg); }
    .post-row:last-child  { border-bottom: 1px solid var(--border); }
    .post-row-title       { font-size: 1rem; }
    .post-row-date        { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* project image */
    .project-image {
      width: 50%;
      max-height: 200px;
      object-fit: contain;
      margin: 1.5rem auto;
      display: block;
    }

    /* detail pages */
    .back         { display: inline-block; font-size: 0.85rem; margin-bottom: 2rem; }
    .detail-title { font-size: clamp(1.75rem, 5vw, 2.75rem); line-height: 1.15; margin-bottom: 0.5rem; }
    .detail-meta  { font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

    /* prose (blog post body / project description) */
    .prose p          { margin-bottom: 1.4rem; }
    .prose h2         { font-size: 1.25rem; text-transform: none; letter-spacing: 0; color: var(--fg); margin: 2.5rem 0 0.75rem; }
    .prose h3         { font-size: 1rem; color: var(--fg); margin: 2rem 0 0.5rem; }
    .prose code       { font-family: monospace; font-size: 0.875em; background: #1a1a1a; padding: 0.1em 0.35em; }
    .prose pre        { background: #1a1a1a; padding: 1.25rem; overflow-x: auto; margin: 1.5rem 0; }
    .prose pre code   { background: none; padding: 0; }
    .prose blockquote { border-left: 2px solid var(--accent); padding-left: 1.25rem; color: var(--muted); margin: 1.5rem 0; }
    .prose a          { color: var(--accent); }
    .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 1.4rem; }

    /* hero photo */
    .hero-photo-toggle {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
    }
    .hero-photo-toggle:hover { color: var(--accent); }

    .hero-photo {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      display: block;
    }

    /* 404 */
    .not-found    { padding: 5rem 0; text-align: center; }
    .not-found h1 { font-size: 2rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>Elm.Main.init({ node: document.getElementById('app') });</script>
</body>
</html>
